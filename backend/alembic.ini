# Alembic config. The actual engine/connection is built in alembic/env.py
# (async, reading DATABASE_URL from pydantic-settings), so this file mostly
# just tells Alembic where the script_location is. We do NOT put the database
# URL here — it would have to be kept in sync with .env by hand.
[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os

# Timezone for filenames: keep UTC so revisions sort deterministically across machines.
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
